services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kobi_api
    volumes:
      - ./backend/app:/app/app        # Kod değişikliği anında yansır (hot reload)
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts # Seed data script'i
    ports:
      - "8000:8000"
    env_file:
      - .env
    # NOT: DATABASE_URL ve REDIS_URL doğrudan .env içinden alınacak.
    # Docker içinden bağlantı için .env'de host 'db' ve 'redis' olarak ayarlanmalıdır.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - kobi_network

  db:
    image: postgres:16-alpine
    container_name: kobi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kobi_network

  redis:
    image: redis:7-alpine
    container_name: kobi_redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - kobi_network

volumes:
  postgres_data:
  redis_data:

networks:
  kobi_network:
    driver: bridge
