version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kobi_api
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - kobi_network

  db:
    image: postgres:16-alpine
    container_name: kobi_db
    environment:
      POSTGRES_DB: kobidb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kobi_network

  redis:
    image: redis:7-alpine
    container_name: kobi_redis
    ports:
      - "6380:6379"
    networks:
      - kobi_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kobi_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - kobi_network

networks:
  kobi_network:
    driver: bridge